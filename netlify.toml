[build]
  command = "echo 'Build OK'"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Revisa los feeds RSS cada hora y guarda alertas en Supabase
[functions."rss-alertas"]
  schedule = "@hourly"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
